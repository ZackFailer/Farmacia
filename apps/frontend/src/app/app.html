<ion-app>
  <ion-menu contentId="main" side="start" [swipeGesture]="false">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>ApoPharma</ion-title>
        <ion-buttons slot="end">
          <app-indicador-sync></app-indicador-sync>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">
      <div class="menu-shell">
        @if (usuario(); as u) {
          <div class="menu-user-info">
            <div class="menu-user-avatar">
              <ion-icon name="person-circle-outline"></ion-icon>
            </div>
            <div class="menu-user-details">
              <span class="menu-user-name">{{ u.nombre }}</span>
              <span class="menu-user-role">{{ rolLabels[u.rol] }}</span>
            </div>
          </div>
        }

        <ion-list class="menu-list">
          @for (item of menuItems(); track item.ruta) {
            <ion-item
              (click)="navegar(item.ruta)"
              lines="none"
              detail="false"
              class="menu-item"
              [class.menu-item-active]="isActive(item)"
              [attr.aria-current]="isActive(item) ? 'page' : null"
            >
              <ion-icon [name]="item.icon" slot="start"></ion-icon>
              <ion-label>{{ item.label }}</ion-label>
            </ion-item>
          }
        </ion-list>

        <div class="menu-logout-wrap">
          <ion-button color="danger" expand="full" fill="clear" (click)="cerrarSesion()">
            Cerrar Sesión
          </ion-button>
        </div>
      </div>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
