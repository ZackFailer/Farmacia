<ion-app>
  <ion-menu contentId="main" side="start" [swipeGesture]="false">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>ApoPharma</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list class="menu-list">
        @for (item of menuItems; track item.ruta) {
          <ion-item
            (click)="navegar(item.ruta)"
            lines="none"
            detail="false"
            class="menu-item"
            [class.menu-item-active]="isActive(item)"
            [attr.aria-current]="isActive(item) ? 'page' : null"
          >
            <ion-icon [name]="item.icon" slot="start"></ion-icon>
            <ion-label>{{ item.label }}</ion-label>
          </ion-item>
        }
      </ion-list>
    </ion-content>

    <ion-footer>
      <ion-toolbar>
        <ion-button color="danger" expand="full" fill="clear" (click)="cerrarSesion()">
          Cerrar Sesión
        </ion-button>
      </ion-toolbar>
    </ion-footer>
  </ion-menu>

  <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
